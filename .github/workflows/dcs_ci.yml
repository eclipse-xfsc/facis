name: DCS CI Pipeline
on:
  push:
    branches:
      - DCS_development

jobs:
  build_docker_image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Verify Go installation
        run: | 
          go env

      - name: Install Goa CLI
        run: |
          go install goa.design/goa/v3/cmd/goa@latest

      - name: Verify Go modules
        run: |
          cd DCS/implementation/backend
          go mod tidy
          go mod verify
          
      - name: Generate Goa design code
        run: |
          cd DCS/implementation/backend
          goa gen digital-contracting-service/design

      - name: Run Tests with Coverage
        run: |
          cd DCS/implementation/backend
          go test ./... -gcflags="all=-N -l" -coverprofile=coverage.out
          go tool cover -func=coverage.out

      - name: Install staticcheck
        run: |
          cd DCS/implementation/backend
          go install honnef.co/go/tools/cmd/staticcheck@latest

      # Switching off ST1001 and ST1000 is needed to fix staticcheck errors caused by goa's generated files and design files
      - name: Run staticcheck
        run: |
          cd DCS/implementation/backend
          staticcheck -checks="all,-ST1001, -ST1000" ./...

      - name: Install govulncheck
        run: |
          cd DCS/implementation/backend
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          cd DCS/implementation/backend
          govulncheck ./...

name: CI Pipeline
on:
  push:
    tags:
      - 'dcs-dev-*.*.*'
      - 'dcs-release-*.*.*'

jobs:
  build_docker_image:
    runs-on: ubuntu-latest
    environment: neusta-development
    env:
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
      DOCKER_REPO: ${{ vars.DOCKER_REPO }}
      DOCKER_TAG: ${{ github.ref_type == 'tag' && github.ref_name }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Verify Go installation
        run: | 
          go env

      - name: Install Goa CLI
        run: |
          go install goa.design/goa/v3/cmd/goa@latest

      - name: Verify Go modules
        run: |
          cd DCS/implementation/backend
          go mod tidy
          go mod verify
          
      - name: Generate Goa design code
        run: |
          cd DCS/implementation/backend
          goa gen digital-contracting-service/design

      - name: Run Tests with Coverage
        run: |
          cd DCS/implementation/backend
          go test ./... -gcflags="all=-N -l" -coverprofile=coverage.out
          go tool cover -func=coverage.out

      - name: Install staticcheck
        run: |
          cd DCS/implementation/backend
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: |
          cd DCS/implementation/backend
          staticcheck ./...

      - name: Install govulncheck
        run: |
          cd DCS/implementation/backend
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          cd DCS/implementation/backend
          govulncheck ./...  

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend Docker image
        run: |
          cd DCS/implementation/backend
          bash build-image.sh $DOCKER_TAG
